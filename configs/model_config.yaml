# =============================================================================
# MedLingo Model Configuration
# All sensitive paths are resolved via environment variables.
# Set MEDLINGO_WEIGHTS_DIR and MEDLINGO_CACHE_DIR in your .env file.
# =============================================================================

vision_encoder:
  backbone: "microsoft/BiomedCLIP-PubMedBERT_256-vit_base_patch16_224"
  output_dim: 768
  frozen: true
  dtype: "float16"               # Keep in FP16 per paper spec

projection_bridges:
  pathway_a:                     # Specialist bridge: 768 → 2048
    in_dim: 768
    out_dim: 2048
    num_layers: 2
    activation: "gelu"
    dropout: 0.1
  pathway_b:                     # Orchestrator bridge: 768 → 4096
    in_dim: 768
    out_dim: 4096
    num_layers: 2
    activation: "gelu"
    dropout: 0.1

router:
  backbone: "meta-llama/Llama-3.2-1B-Instruct"
  quantization: "nf4"
  double_quantization: true
  top_k_experts: 2
  domains:
    - pathology
    - radiology
    - dermatology
    - cardiology
    - neurology
    - general_medicine
  hidden_dim: 2048
  confidence_threshold: 0.35

specialists:
  backbone: "meta-llama/Llama-3.2-1B-Instruct"
  quantization: "nf4"
  double_quantization: true
  hidden_dim: 2048
  lora:
    r: 64
    alpha: 128
    dropout: 0.05
    target_modules:
      - "q_proj"
      - "k_proj"
      - "v_proj"
      - "o_proj"
      - "gate_proj"
      - "up_proj"
      - "down_proj"
    bias: "none"
    task_type: "CAUSAL_LM"
  domains:
    pathology:
      adapter_id: "pathology_expert_v1"
      specialization_tokens: ["[PATH]", "[HISTO]", "[CYTOLOGY]"]
    radiology:
      adapter_id: "radiology_expert_v1"
      specialization_tokens: ["[RAD]", "[XRAY]", "[CT]", "[MRI]"]
    dermatology:
      adapter_id: "dermatology_expert_v1"
      specialization_tokens: ["[DERM]", "[LESION]", "[SKIN]"]
    cardiology:
      adapter_id: "cardiology_expert_v1"
      specialization_tokens: ["[CARDIO]", "[ECG]", "[ECHO]"]
    neurology:
      adapter_id: "neurology_expert_v1"
      specialization_tokens: ["[NEURO]", "[BRAIN]", "[SPINE]"]
    general_medicine:
      adapter_id: "general_expert_v1"
      specialization_tokens: ["[GEN]", "[CLINICAL]"]

adjudicator:
  backbone: "m42-health/Llama3-Med42-8B"      # Aloebeta-equivalent open model
  quantization: "nf4"
  double_quantization: true
  hidden_dim: 4096
  use_flash_attention: true
  use_kv_cache: true
  max_new_tokens: 512
  lora:                                         # Stage 4 DPO adapter
    r: 128
    alpha: 256
    dropout: 0.05
    target_modules:
      - "q_proj"
      - "k_proj"
      - "v_proj"
      - "o_proj"
      - "gate_proj"
      - "up_proj"
      - "down_proj"
    bias: "none"
    task_type: "CAUSAL_LM"

memory:
  max_vram_gb: 16.0
  peak_target_gb: 14.8
  specialist_footprint_gb: 1.2
  adjudicator_footprint_gb: 5.5
  enable_gradient_checkpointing: true
  offload_to_cpu: false           # Set true only if VRAM < 12GB

generation:
  temperature: 0.1
  top_p: 0.9
  repetition_penalty: 1.15
  do_sample: false                # Deterministic for clinical outputs
